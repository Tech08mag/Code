services:
  fahrgemeinschaften:
    container_name: spotidown
    image: spotidown:latest
    ports:
      - 5000:5000
    volumes:
      - ./data:/data
      - /home/jackmos/navidrome/downloads:/music #map to the navidrome musicfolder
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
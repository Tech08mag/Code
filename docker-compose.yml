services:
  spotidown:
    container_name: spotidown
    image: spotidown:latest
    user: "1000:1000"
    ports:
      - 5001:5000
    volumes:
      - ./data:/data
      - /home/jackmos/navidrome/downloads:/music #map to the navidrome musicfolder
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge